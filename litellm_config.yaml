# =============================================================================
# LiteLLM Proxy Configuration for SAP BTP + SAP AI Core
# =============================================================================
#
# Two routing strategies:
# 1. OpenAI-compat models (GPT, Sonar): direct /v1/chat/completions endpoints
# 2. Non-OpenAI models (Claude, Gemini): SAP orchestration via "sap/" provider
#    (auto-fetches OAuth2 token from AICORE_SERVICE_KEY env var)
# =============================================================================

model_list:

  # --------------------------------------------------------------------------
  # Direct OpenAI-compatible (GPT models have /v1/chat/completions on AI Core)
  # --------------------------------------------------------------------------

  - model_name: gpt-4.1
    litellm_params:
      model: openai/gpt-4.1
      api_base: os.environ/AICORE_GPT41_API_BASE
      api_key: os.environ/AICORE_OAUTH_TOKEN
      extra_headers:
        AI-Resource-Group: os.environ/AICORE_RESOURCE_GROUP

  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_base: os.environ/AICORE_GPT5_API_BASE
      api_key: os.environ/AICORE_OAUTH_TOKEN
      extra_headers:
        AI-Resource-Group: os.environ/AICORE_RESOURCE_GROUP

  - model_name: sonar
    litellm_params:
      model: openai/sonar
      api_base: os.environ/AICORE_SONAR_API_BASE
      api_key: os.environ/AICORE_OAUTH_TOKEN
      extra_headers:
        AI-Resource-Group: os.environ/AICORE_RESOURCE_GROUP

  # --------------------------------------------------------------------------
  # SAP Orchestration (Claude, Gemini via unified /completion endpoint)
  # Credentials auto-resolved from AICORE_SERVICE_KEY env var
  # --------------------------------------------------------------------------

  - model_name: claude-4.5-sonnet
    litellm_params:
      model: sap/anthropic--claude-4.5-sonnet

  - model_name: claude-4.5-haiku
    litellm_params:
      model: sap/anthropic--claude-4.5-haiku

  - model_name: gemini-2.5-pro
    litellm_params:
      model: sap/gemini-2.5-pro

# ---------------------------------------------------------------------------
# LITELLM SETTINGS
# ---------------------------------------------------------------------------
litellm_settings:
  drop_params: True
  num_retries: 3
  request_timeout: 600
  fallbacks:
    - {"gpt-5": ["claude-4.5-sonnet"]}
    - {"claude-4.5-sonnet": ["gpt-5"]}
    - {"gpt-4.1": ["claude-4.5-haiku"]}

# ---------------------------------------------------------------------------
# GENERAL SETTINGS
# ---------------------------------------------------------------------------
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

# ---------------------------------------------------------------------------
# ROUTER SETTINGS
# ---------------------------------------------------------------------------
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 600
